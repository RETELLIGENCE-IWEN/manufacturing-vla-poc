dataset_dir: outputs/m3_phase_aware_dataset_5000
run_dir: runs/m3_bc_phase_weighted_5000

seed: 42

training:
  batch_size: 256
  num_epochs: 500
  learning_rate: 0.0003
  weight_decay: 0.000001
  grad_clip_norm: 1.0

model:
  hidden_dims: [256, 256, 128]
  activation: relu
  dropout: 0.05

loss:
  early_end: 0.35
  mid_end: 0.65
  early_weight: 1.0
  mid_weight: 2.0
  late_weight: 4.0
  normalize_phase_weights: true
  gripper_weight: 1.0

logging:
  print_every_epochs: 25