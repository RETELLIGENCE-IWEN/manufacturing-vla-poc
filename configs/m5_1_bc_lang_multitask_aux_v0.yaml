dataset_dir: outputs/m5_multitask_lang_phase_aware_dataset
run_dir: runs/m5_1_bc_lang_multitask_aux_v0

seed: 42

training:
  batch_size: 256
  num_epochs: 500
  learning_rate: 0.0003
  weight_decay: 0.000001
  grad_clip_norm: 1.0

model:
  hidden_dims: [256, 256, 128]
  activation: relu
  dropout: 0.05

loss:
  early_end: 0.35
  mid_end: 0.65
  early_weight: 1.0
  mid_weight: 2.0
  late_weight: 4.0
  normalize_phase_weights: true
  use_dataset_sample_weight: true
  normalize_total_weights: false
  gripper_weight: 1.0

lang:
  lang_proj_dim: 64

aux:
  aux_weight: 1.0

logging:
  print_every_epochs: 25
